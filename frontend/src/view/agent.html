<link rel="stylesheet" href="style/work.css">

<div class="scan-container">
    <h2 class="scan-title">Agents 🤖</h2>
    
    <div class="scan-grid">
        <div class="scan-card">
            <h3>Domain Controller 🏰</h3>
            <p>Agent for Domain Controller (AD).</p>
            <button class="btn-action" onclick="downloadAgent(1, 'Domain Controller')" style="width: auto; padding: 0.5rem 1rem;">Download AD 💾</button>
        </div>

        <div class="scan-card">
            <h3>Windows Hosts 💻</h3>
            <p>Agent for Windows workstations.</p>
            <button class="btn-action" onclick="downloadAgent(2, 'Windows Host')" style="width: auto; padding: 0.5rem 1rem;">Download Win 🚀</button>
        </div>

        <div class="scan-card">
            <h3>Linux Hosts 🐧</h3>
            <p>Bash script for Linux servers.</p>
            <button class="btn-action" onclick="downloadAgent(3, 'Linux Host')" style="width: auto; padding: 0.5rem 1rem;">Download Linux 🐧</button>
        </div>

        <div class="scan-card">
            <h3>Maintenance 🧹</h3>
            <p>Remove all active tokens.</p>
            <button class="btn-action" onclick="clearTokens()" style="width: auto; padding: 0.5rem 1rem; background: #f87171;">Clear Tokens 🧹</button>
        </div>
    </div>
</div>
