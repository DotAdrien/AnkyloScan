<link rel="stylesheet" href="style/work.css">

<div class="scan-container">
    <h2 class="scan-title">Network Scans 🛡️</h2>
    
    <div class="scan-card" style="grid-column: 1 / -1; margin-bottom: 2rem;">
        <h3>Vulnerability Scheduling ⏰</h3>
        <p>Configure the frequency and type of automatic scans.</p>
        
        <div class="form-field-work">
            <div class="form-group-item">
                <label>TIME (HOURS)</label>
                <input type="number" id="scan-frequency" value="24" min="1" max="168">
            </div>

            <div class="form-group-item">
                <label>SCAN TYPE</label>
                <select id="scan-type-select">
                    <option value="1">1 - Quick 🔍</option>
                    <option value="2">2 - Security 🛡️</option>
                    <option value="3" selected>3 - Full 🦖</option>
                </select>
            </div>

            <button class="btn-action" @click="saveAndScheduleScan()">
                Save 💾
            </button>
        </div>
    </div>

    <div class="scan-grid">
        <div class="scan-card">
            <h3>Quick Scan 🔍</h3>
            <p>Machines and their OS.</p>
            <button class="btn-action" @click="runQuickScan()">Launch ✨</button>
        </div>

        <div class="scan-card">
            <h3>Security Scan 🛡️</h3>
            <p>Open ports and MAC addresses.</p>
            <button class="btn-action" @click="runSecurityScan()">Launch ✨</button>
        </div>

        <div class="scan-card">
            <h3>Full Scan 🦖</h3>
            <p>Version analysis and vulnerabilities.</p>
            <button class="btn-action" @click="runFullScan()">Launch ✨</button>
        </div>
    </div>
</div>
