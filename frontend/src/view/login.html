<link rel="stylesheet" href="style/login.css">
     
<div class="login-container" x-data x-init="window.initAdminSetup && window.initAdminSetup()">
    <div class="auth-card">
        <h2 class="auth-title">Connexion 👤</h2>
            <form @submit.prevent="submitLogin($data)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" placeholder="admin@ankyloscan.com" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" placeholder="••••••••" class="form-input" required>
                </div>
                <button type="submit" class="btn-login">
                    Se connecter 🥵
                </button>
            </form>
    </div>
</div>
