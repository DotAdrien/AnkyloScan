<link rel="stylesheet" href="style/email.css">

<div class="email-container" x-data="emailConfig" x-init="loadEmailConfig()">
    <h2 class="email-title">Alert Configuration 📧</h2>
    
    <div class="email-card">
        <form class="email-form" @submit.prevent="saveEmailConfig()">
            <div class="form-field">
                <label>Sender Email</label>
                <input type="email" x-model="senderEmail" placeholder="alert@ankyloscan.com" required>
            </div>
            
            <div class="form-field">
                <label>API Key (16 characters)</label>
                <input type="text" x-model="apiKey" maxlength="16" placeholder="A1B2C3D4E5F6G7H8" required>
            </div>
            
            <div class="form-field">
                <label>Recipients (separated by ;)</label>
                <input type="text" x-model="recipients" placeholder="admin@test.com;user@test.com">
            </div>

            <div class="options-group">
                <label class="checkbox-item">
                    <input type="checkbox" x-model="scanQuickAlerts">
                    <span>Quick Scan Completion Alert (Level 1) ⚡</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" x-model="scanSecurityAlerts">
                    <span>Security Scan Completion Alert (Level 2) 🛡️</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" x-model="scanFullAlerts">
                    <span>Full Scan & Vulnerabilities Alert (Level 3) 🦖</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" x-model="agentLogAlerts">
                    <span>Agent Logs 🤖</span>
                </label>
            </div>
            
            <button type="submit" class="btn-submit">
                Save Configuration 🥵
            </button>
        </form>
    </div>
</div>
