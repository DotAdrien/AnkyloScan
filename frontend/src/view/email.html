<link rel="stylesheet" href="style/email.css">

<div class="email-container" x-data="emailConfig" x-init="loadEmailConfig()">
    <h2 class="email-title">Configuration Alertes 📧</h2>
    
    <div class="email-card">
        <form class="email-form" @submit.prevent="saveEmailConfig()">
            <div class="form-field">
                <label>Email Expéditeur</label>
                <input type="email" x-model="senderEmail" placeholder="alerte@ankyloscan.com" required>
            </div>
            
            <div class="form-field">
                <label>Clé API (16 caractères)</label>
                <input type="text" x-model="apiKey" maxlength="16" placeholder="A1B2C3D4E5F6G7H8" required>
            </div>
            
            <div class="form-field">
                <label>Destinataires (séparés par ;)</label>
                <input type="text" x-model="recipients" placeholder="admin@test.com;user@test.com">
            </div>

            <div class="options-group">
                <label class="checkbox-item">
                    <input type="checkbox" x-model="vulnLevel3Alerts">
                    <span>Vulnérabilités des scans de niveaux 3 🚨</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" x-model="agentLogAlerts">
                    <span>Logs des différents agents 🤖</span>
                </label>
            </div>
            
            <button type="submit" class="btn-submit">
                Sauvegarder la config 🥵
            </button>
        </form>
    </div>
</div>
