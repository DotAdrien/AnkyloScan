<link rel="stylesheet" href="style/work.css">

<div class="scan-container" x-init="loadList()">
    <h2 class="scan-title">Liste Faux Positifs 🛡️</h2>
    
    <div class="scan-card list-add-card">
        <h3>Ajouter un mot à ignorer 🚫</h3>
        <p>Ajoute un titre de vulnérabilité, un script NSE ou une CVE pour l'ignorer lors de l'analyse experte V3.</p>
        
        <form @submit.prevent="addWordToList()" class="form-field-work list-add-form">
            <div class="form-group-item list-input-group">
                <label for="new-word-input">MOT / CVE / TITRE</label>
                <input type="text" id="new-word-input" placeholder="ex: CVE-2024-1234 ou TELNET" required>
            </div>
            <button type="submit" class="btn-action list-add-button">
                Ajouter ✨
            </button>
        </form>
    </div>

    <div class="scan-grid list-display-grid" id="words-list-container">
        <!-- Les mots seront injectés ici par list.js -->
    </div>
</div>
