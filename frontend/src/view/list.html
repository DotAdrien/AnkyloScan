<link rel="stylesheet" href="style/work.css">

<div class="scan-container" x-init="loadList()">
    <h2 class="scan-title">False Positives List 🛡️</h2>
    
    <div class="scan-card list-add-card">
        <h3>Add word to ignore 🚫</h3>
        <p>Add a vulnerability title, an NSE script, or a CVE to ignore it during the V3 expert analysis.</p>
        
        <form @submit.prevent="addWordToList()" class="form-field-work list-add-form" style="align-items: center;">
            <div class="form-group-item list-input-group" style="flex-grow: 1;">
                <label for="new-word-input">WORD / CVE / TITLE</label>
                <input type="text" id="new-word-input" placeholder="e.g.: CVE-2024-1234 or TELNET" required style="width: 100%;">
            </div>
            <div style="flex-shrink: 0;">
                <button type="submit" class="btn-action list-add-button" style="width: auto; padding: 0.75rem 1.5rem;">
                    Add ✨
                </button>
            </div>
        </form>
    </div>

    <div class="scan-grid list-display-grid" id="words-list-container">
    </div>
</div>
