<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AnkyloScan | Dashboard 🛡️</title>

    <script>
    window.API_BASE = `http://${window.location.hostname}:8001`;
    console.log("AnkyloScan API set to: " + window.API_BASE);
    </script>
    
    <script src="js/login.js" defer></script>
    <script src="js/me.js" defer></script>
    <script src="js/work.js" defer></script>
    <script src="js/result.js" defer></script>
    <script src="js/email.js" defer></script>
    <script src="js/affichage.js" defer></script>
    <script src="js/logs.js" defer></script>
    <script src="js/agent.js" defer></script>
    <script src="js/setup.js" defer></script>
    <script src="js/dashboard.js" defer></script>
    <script src="js/list.js" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="style/index.css">
</head>

<body class="bg-custom" x-data="app()" x-init="await init()">

    <aside class="sidebar">
        <div @click="handleProfileClick()" class="nav-avatar">
            <span x-text="user.loggedIn ? (user.name ? user.name.charAt(0).toUpperCase() : 'A') : '?'"></span>
        </div>
        
        <nav class="nav-links">
        </nav>
    </aside>

    <main>
        <div x-html="pageContent" 
             class="page-transition"
             x-show="!loading"
             x-transition:enter="fade-in">
        </div>
    </main>

    <script>
        function app() {
            return {
                currentPage: localStorage.getItem('ankyloscan_last_view') || 'landing',
                pageContent: '',
                loading: true,
                user: { loggedIn: false, id: null, name: '', email: '', rank: '' },

                async init() {
                    try {
                        const profile = fetchMe();
                        if (profile) this.user = profile;
                    } catch (e) {
                        console.error("Profile error:", e);
                    }
                    await this.changePage(this.currentPage);
                },

                handleProfileClick() {
                    if (this.user.loggedIn) {
                        this.changePage('profile');
                    } else {
                        this.changePage('login');
                    }
                },

                async changePage(pageName) {
                    this.currentPage = pageName;
                    localStorage.setItem('ankyloscan_last_view', pageName);
                    this.loading = false;

                    try {
                        const response = await fetch(`view/${pageName}.html`);
                        if (!response.ok) throw new Error('Page not found');
                        
                        this.pageContent = await response.text();
                    } catch (err) {
                        this.pageContent = "<div>Error 😱</div>";
                    }
                }
            }
        }
    </script>
</body>
</html>
